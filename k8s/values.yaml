# Default values for team-shuffler.
# Environment-specific values override these in values-dev.yaml / k8s/values-prod.yaml.

image:
  repository: bonditgroup/team-shuffler-frontend
  pullPolicy: Always
  tag: "latest"

replicaCount: 1

# Docker Hub pull secret — required if the repository is private
# Create with: kubectl create secret docker-registry dockerhub-pull-secret \
#   --docker-username=<user> --docker-password=<token> -n team-shuffler
imagePullSecrets: []
# - name: dockerhub-pull-secret

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 12

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts: []   # Defined per environment
  tls: []     # Defined per environment

# Infisical secrets management
infisical:
  enabled: true
  projectSlug: "bond-it-consultant-portal-xy9v"
  hostAPI: "https://eu.infisical.com/api"
  secretsPath: "/"
  # identityId and envSlug are set per environment

serviceAccount:
  name: ""

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 0
    maxSurge: 1
