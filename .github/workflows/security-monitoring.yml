name: 🛡️ LEGO Security Monitoring

on:
  schedule:
    # Weekly security scan — Sundays at 22:00 UTC
    - cron: "0 22 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: 🔍 Weekly LEGO Security Fortress Scan (CodeQL)
    runs-on: ubuntu-latest

    steps:
      - name: 📎 Get LEGO Security Instructions
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🔧 Initialize CodeQL — JavaScript/TypeScript
        uses: github/codeql-action/init@e03543dad62555ecf6606aabe9724fd07e1cd632 # v3.32.6
        with:
          languages: javascript-typescript
          build-mode: none
          queries: security-extended

      - name: 🔍 Perform Security Analysis
        uses: github/codeql-action/analyze@e03543dad62555ecf6606aabe9724fd07e1cd632 # v3.32.6
        with:
          category: "/language:javascript-typescript"

      - name: 📊 Security Scan Complete
        run: |
          echo "🛡️ Weekly CodeQL security analysis completed"
          echo "Results are available in the GitHub Security tab → Code scanning alerts"
